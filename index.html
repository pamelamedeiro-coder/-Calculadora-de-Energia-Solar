<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☀️ Calculadora de Energia Solar</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>☀️ Calculadora de Energia Solar</h1>
    <p>Descubra quanto você pode economizar utilizando energia solar.</p>
</header>

<main>

<div class="container">

    <div class="card">

        <h2>⚡ Consumo Mensal (kWh)</h2>

        <input
            type="number"
            id="consumo"
            placeholder="Ex: 500"
        >

    </div>

    <div class="card">

        <h2>💰 Valor Atual da Conta (R$)</h2>

        <input
            type="number"
            id="conta"
            placeholder="Ex: 350"
        >

    </div>

    <button id="calcular">
        Calcular Economia
    </button>

    <section id="resultado"></section>

</div>

</main>

<footer>
    Projeto Agrinho 2026
</footer>

<script src="script.js"></script>

</body>
</html>
